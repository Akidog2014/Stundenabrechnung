<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung PRO</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 4vw;
        background-color: #eeeeee;
        margin: 0;
    }

    h2 {
        font-size: 8vw;
        margin-bottom: 4vh;
    }

    .button-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3vh;
    }

    button {
        width: 85vw;
        max-width: 600px;

        height: 16vh;
        min-height: 90px;

        font-size: 8vw;
        font-weight: bold;

        border: none;
        border-radius: 5vw;
        color: white;

        display: flex;
        align-items: center;
        justify-content: center;
    }

    #startStopBtn {
        background-color: #008000; /* kräftiges Grün */
    }

    #saveTextBtn {
        background-color: #0055ff;
    }

    #sendBtn {
        background-color: #ff8800;
    }

    button:active {
        transform: scale(0.95);
    }

    textarea {
        width: 85vw;
        max-width: 600px;

        height: 20vh;

        font-size: 6vw;
        margin-top: 3vh;

        border-radius: 4vw;
        padding: 4vw;
    }

    #log {
        margin-top: 4vh;
        text-align: left;

        width: 85vw;
        max-width: 600px;

        margin-left: auto;
        margin-right: auto;

        background: white;
        padding: 4vw;
        border-radius: 4vw;

        font-size: 6vw;
    }

    #log p {
        margin: 1.5vh 0;
    }

    h3 {
        font-size: 6.5vw;
        margin-bottom: 2vh;
    }

    /* Desktop */
    @media (min-width: 768px) {
        h2 {
            font-size: 40px;
        }

        button {
            font-size: 26px;
            height: 110px;
        }

        textarea {
            font-size: 20px;
        }

        #log {
            font-size: 18px;
        }

        h3 {
            font-size: 22px;
        }
    }
</style>
</head>

<body>

<h2>Zeiterfassung</h2>

<div class="button-container">
    <button id="startStopBtn">▶ START / ⏹ ENDE</button>
</div>

<textarea id="textInput" placeholder="📝 Notiz eingeben..."></textarea>

<div class="button-container">
    <button id="saveTextBtn">💾 TEXT SPEICHERN</button>
    <button id="sendBtn">📧 SENDEN</button>
</div>

<div id="log"></div>

<script>
let logs = JSON.parse(localStorage.getItem("logs")) || [];

function saveLogs() {
    localStorage.setItem("logs", JSON.stringify(logs));
}

function getNextType() {
    if (logs.length === 0) return "START";

    const last = logs[logs.length - 1];

    if (last.startsWith("START")) {
        return "ENDE";
    } else if (last.startsWith("ENDE")) {
        return "START";
    } else {
        return "START";
    }
}

function updateLogDisplay() {
    const logDiv = document.getElementById("log");
    const nextType = getNextType();

    logDiv.innerHTML = "<h3>Nächster: " + nextType + "</h3>";

    logs.forEach(entry => {
        const p = document.createElement("p");
        p.textContent = entry;
        logDiv.appendChild(p);
    });
}

function getCurrentDateTime() {
    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    const hours = String(now.getHours()).padStart(2, "0");
    const minutes = String(now.getMinutes()).padStart(2, "0");

    return `${day}.${month}.${year} ${hours}:${minutes}`;
}

document.getElementById("startStopBtn").addEventListener("click", function() {
    const now = getCurrentDateTime();
    const type = getNextType();

    logs.push(type + ": " + now);

    saveLogs();
    updateLogDisplay();
});

document.getElementById("saveTextBtn").addEventListener("click", function() {
    const text = document.getElementById("textInput").value;

    if (text.trim() !== "") {
        const now = getCurrentDateTime();
        logs.push("NOTIZ (" + now + "): " + text);
        document.getElementById("textInput").value = "";
        saveLogs();
        updateLogDisplay();
    }
});

document.getElementById("sendBtn").addEventListener("click", function() {
    if (logs.length === 0) {
        alert("Keine Einträge vorhanden!");
        return;
    }

    let content = "Zeiterfassung:\n\n";

    logs.forEach(entry => {
        content += entry + "\n";
    });

    const email = "wueest.marc@bluewin.ch";
    const subject = encodeURIComponent("Zeiterfassung");
    const body = encodeURIComponent(content);

    window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;

    logs = [];
    saveLogs();
    updateLogDisplay();
});

updateLogDisplay();
</script>

</body>
</html>
