<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 5vw;
        background-color: #f5f5f5;
        margin: 0;
    }

    h2 {
        margin-bottom: 5vh;
        font-size: 5vw;
    }

    /* BUTTON CONTAINER */
    .button-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2vh;
        width: 100%;
    }

    /* BUTTONS */
    button {
        font-size: 5vw;
        height: 12vh;
        min-height: 60px;
        max-height: 100px;
        border: none;
        border-radius: 3vw;
        color: white;
        width: 90vw;
        max-width: 600px;

        display: flex;
        align-items: center;
        justify-content: center;
    }

    #startStopBtn {
        background-color: green;
    }

    #saveTextBtn {
        background-color: blue;
    }

    #sendBtn {
        background-color: orange;
    }

    button:active {
        transform: scale(0.97);
    }

    textarea {
        width: 90vw;
        max-width: 600px;
        height: 15vh;
        margin-top: 2vh;
        font-size: 4vw;
        border-radius: 3vw;
        padding: 3vw;
    }

    #log {
        margin-top: 4vh;
        text-align: left;
        width: 90vw;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        background: white;
        padding: 3vw;
        border-radius: 3vw;
        font-size: 4vw;
    }

    #log p {
        margin: 1vh 0;
    }

    h3 {
        font-size: 4.5vw;
    }

    /* Desktop Anpassung */
    @media (min-width: 768px) {
        h2 {
            font-size: 32px;
        }

        button {
            font-size: 20px;
        }

        textarea {
            font-size: 16px;
        }

        #log {
            font-size: 16px;
        }

        h3 {
            font-size: 18px;
        }
    }
</style>
</head>

<body>

<h2>Zeiterfassung</h2>

<div class="button-container">
    <button id="startStopBtn">Eintrag</button>
</div>

<textarea id="textInput" placeholder="Text eingeben..."></textarea>

<div class="button-container">
    <button id="saveTextBtn">Text speichern</button>
    <button id="sendBtn">Senden</button>
</div>

<div id="log"></div>

<script>
// Daten laden
let logs = JSON.parse(localStorage.getItem("logs")) || [];

// Funktion zum Speichern
function saveLogs() {
    localStorage.setItem("logs", JSON.stringify(logs));
}

// Nächster Eintragstyp
function getNextType() {
    if (logs.length === 0) return "Anfang";

    const last = logs[logs.length - 1];

    if (last.startsWith("Anfang")) {
        return "Ende";
    } else if (last.startsWith("Ende")) {
        return "Anfang";
    } else {
        return "Anfang";
    }
}

// Anzeige aktualisieren
function updateLogDisplay() {
    const logDiv = document.getElementById("log");
    const nextType = getNextType();

    logDiv.innerHTML = "<h3>" + nextType + ":</h3>";

    logs.forEach(entry => {
        const p = document.createElement("p");
        p.textContent = entry;
        logDiv.appendChild(p);
    });
}

// Datum + Zeit
function getCurrentDateTime() {
    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    const hours = String(now.getHours()).padStart(2, "0");
    const minutes = String(now.getMinutes()).padStart(2, "0");

    return `${day}.${month}.${year} ${hours}:${minutes}`;
}

// EINTRAG BUTTON
document.getElementById("startStopBtn").addEventListener("click", function() {
    const now = getCurrentDateTime();
    const type = getNextType();

    logs.push(type + ": " + now);

    saveLogs();
    updateLogDisplay();
});

// TEXT SPEICHERN
document.getElementById("saveTextBtn").addEventListener("click", function() {
    const text = document.getElementById("textInput").value;

    if (text.trim() !== "") {
        const now = getCurrentDateTime();
        logs.push("Notiz (" + now + "): " + text);
        document.getElementById("textInput").value = "";
        saveLogs();
        updateLogDisplay();
    }
});

// SENDEN
document.getElementById("sendBtn").addEventListener("click", function() {
    if (logs.length === 0) {
        alert("Keine Einträge vorhanden!");
        return;
    }

    let content = "Zeiterfassung:\n\n";

    logs.forEach(entry => {
        content += entry + "\n";
    });

    const email = "wueest.marc@bluewin.ch";
    const subject = encodeURIComponent("Zeiterfassung");
    const body = encodeURIComponent(content);

    const mailtoLink = `mailto:${email}?subject=${subject}&body=${body}`;

    window.location.href = mailtoLink;

    logs = [];
    saveLogs();
    updateLogDisplay();
});

// Anzeige beim Laden
updateLogDisplay();
</script>

</body>
</html>
