<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung 2.0</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 4vw;
        background-color: #eeeeee;
        margin: 0;
    }

    h2 {
        font-size: 8vw;
        margin-bottom: 4vh;
    }

    .button-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3vh;
    }

    button {
        width: 85vw;
        max-width: 600px;
        height: 16vh;
        min-height: 90px;
        font-size: 8vw;
        font-weight: bold;
        border: none;
        border-radius: 5vw;
        color: white;
    }

    #startStopBtn { background-color: #008000; }
    #saveTextBtn { background-color: #0055ff; }
    #sendBtn { background-color: #ff8800; }

    button:active {
        transform: scale(0.95);
    }

    textarea {
        width: 85vw;
        max-width: 600px;
        height: 20vh;
        font-size: 6vw;
        margin-top: 3vh;
        border-radius: 4vw;
        padding: 4vw;
    }

    #log {
        margin-top: 4vh;
        width: 85vw;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        background: white;
        padding: 4vw;
        border-radius: 4vw;
    }

    .entry {
        display: flex;
        gap: 2vw;
        margin-bottom: 2vh;
    }

    .entry input {
        flex: 1;
        font-size: 5vw;
        padding: 2vw;
        border-radius: 2vw;
        border: 1px solid #ccc;
    }

    .deleteBtn {
        background: red;
        width: 12vw;
        font-size: 5vw;
        border-radius: 2vw;
    }

    h3 {
        font-size: 6.5vw;
    }

    @media (min-width: 768px) {
        h2 { font-size: 40px; }
        button { font-size: 26px; height: 110px; }
        textarea { font-size: 20px; }
        .entry input { font-size: 18px; }
        h3 { font-size: 22px; }
    }
</style>
</head>

<body>

<h2>Zeiterfassung</h2>

<div class="button-container">
    <button id="startStopBtn">▶ START / ⏹ ENDE</button>
</div>

<textarea id="textInput" placeholder="📝 Notiz eingeben..."></textarea>

<div class="button-container">
    <button id="saveTextBtn">💾 TEXT SPEICHERN</button>
    <button id="sendBtn">📧 SENDEN</button>
</div>

<div id="log"></div>

<script>
let logs = JSON.parse(localStorage.getItem("logs")) || [];

function saveLogs() {
    localStorage.setItem("logs", JSON.stringify(logs));
}

function getNextType() {
    if (logs.length === 0) return "START";

    const last = logs[logs.length - 1];

    if (last.startsWith("START")) return "ENDE";
    if (last.startsWith("ENDE")) return "START";

    return "START";
}

function getCurrentDateTime() {
    const now = new Date();
    const d = String(now.getDate()).padStart(2, "0");
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const y = now.getFullYear();
    const h = String(now.getHours()).padStart(2, "0");
    const min = String(now.getMinutes()).padStart(2, "0");

    return `${d}.${m}.${y} ${h}:${min}`;
}

function updateLogDisplay() {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML = "<h3>Nächster: " + getNextType() + "</h3>";

logs.forEach((entry, index) => {
    const row = document.createElement("div");
    row.className = "entry";
    row.style.flexDirection = "column";

    let display = document.createElement("div");

    if (entry.startsWith("START") || entry.startsWith("ENDE")) {
        const [type, time] = entry.split(": ");

        display.innerHTML = `
            <div style="font-size: 4vw; color: gray;">${type}</div>
            <div style="font-size: 7vw; font-weight: bold;">${time}</div>
        `;
    } else {
        display.innerHTML = `<div style="font-size: 5vw;">${entry}</div>`;
    }

    // Klick zum Bearbeiten
    display.onclick = () => {
        const input = document.createElement("input");
        input.value = entry;
        input.style.fontSize = "5vw";
        input.style.width = "100%";

        input.onblur = () => {
            logs[index] = input.value;
            saveLogs();
            updateLogDisplay();
        };

        row.innerHTML = "";
        row.appendChild(input);
        input.focus();
    };

    const del = document.createElement("button");
    del.textContent = "❌";
    del.className = "deleteBtn";

    del.onclick = () => {
        logs.splice(index, 1);
        saveLogs();
        updateLogDisplay();
    };

    row.appendChild(display);
    row.appendChild(del);
    logDiv.appendChild(row);
});
}

document.getElementById("startStopBtn").onclick = () => {
    const type = getNextType();
    const time = getCurrentDateTime();

    logs.push(type + ": " + time);
    saveLogs();
    updateLogDisplay();
};

document.getElementById("saveTextBtn").onclick = () => {
    const text = document.getElementById("textInput").value;

    if (text.trim() !== "") {
        logs.push("NOTIZ (" + getCurrentDateTime() + "): " + text);
        document.getElementById("textInput").value = "";
        saveLogs();
        updateLogDisplay();
    }
};

document.getElementById("sendBtn").onclick = () => {
    if (logs.length === 0) {
        alert("Keine Einträge vorhanden!");
        return;
    }

    let content = "Zeiterfassung:\n\n";
    logs.forEach(e => content += e + "\n");

    const email = "marco.wueest@lu.ch";
    const subject = encodeURIComponent("Zeiterfassung");
    const body = encodeURIComponent(content);

    window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;

    logs = [];
    saveLogs();
    updateLogDisplay();
};

updateLogDisplay();
</script>

</body>
</html>
